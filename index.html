<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Spinner</title>
    <style>
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            background: #16213e;
            color: #fff;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
            padding: 28px 16px 40px;
        }

        h1 {
            font-size: clamp(1.4rem, 5vw, 2.2rem);
            color: #ffd700;
            letter-spacing: 3px;
            text-transform: uppercase;
            text-shadow: 0 0 30px rgba(255, 215, 0, 0.4);
            margin-bottom: 28px;
        }

        #wheel-container {
            position: relative;
            display: inline-block;
        }

        /* Downward-pointing triangle at the top of the wheel */
        #pointer {
            position: absolute;
            top: -2px;
            left: 50%;
            transform: translateX(-50%);
            width: 0;
            height: 0;
            border-left: 14px solid transparent;
            border-right: 14px solid transparent;
            border-top: 28px solid #ffd700;
            filter: drop-shadow(0 2px 6px rgba(255, 215, 0, 0.7));
            z-index: 10;
        }

        canvas {
            display: block;
            border-radius: 50%;
            box-shadow:
                0 0 0 6px #0f3460,
                0 0 50px rgba(0, 0, 0, 0.7),
                0 0 90px rgba(255, 215, 0, 0.08);
        }

        #spin-btn {
            margin-top: 32px;
            padding: 14px 60px;
            font-size: 1.2rem;
            font-weight: 700;
            background: linear-gradient(135deg, #ffd700, #ff8c00);
            color: #16213e;
            border: none;
            border-radius: 50px;
            cursor: pointer;
            text-transform: uppercase;
            letter-spacing: 3px;
            box-shadow: 0 4px 22px rgba(255, 140, 0, 0.45);
            transition: transform 0.15s, box-shadow 0.15s;
        }

        #spin-btn:hover:not(:disabled) {
            transform: translateY(-3px);
            box-shadow: 0 8px 30px rgba(255, 140, 0, 0.65);
        }

        #spin-btn:active:not(:disabled) {
            transform: translateY(-1px);
        }

        #spin-btn:disabled {
            opacity: 0.45;
            cursor: default;
            transform: none;
            box-shadow: none;
        }

        #result {
            margin-top: 22px;
            font-size: clamp(1.2rem, 4vw, 1.8rem);
            font-weight: 700;
            min-height: 2.4rem;
            color: #ffd700;
            text-align: center;
            text-shadow: 0 0 24px rgba(255, 215, 0, 0.65);
        }

        #error {
            margin-top: 18px;
            color: #e74c3c;
            text-align: center;
            font-size: 0.9rem;
            max-width: 440px;
            line-height: 1.6;
            background: rgba(231, 76, 60, 0.1);
            border: 1px solid rgba(231, 76, 60, 0.3);
            border-radius: 8px;
            padding: 12px 16px;
        }
    </style>
</head>
<body>

<h1>🎡 Spin to Win</h1>

<div id="wheel-container">
    <div id="pointer"></div>
    <canvas id="wheel"></canvas>
</div>

<button id="spin-btn">Spin</button>
<div id="result"></div>
<div id="error"></div>

<script>
// ─── Segment colours ────────────────────────────────────────────────────────
const COLORS = [
    '#e74c3c', '#3498db', '#2ecc71', '#f1c40f', '#9b59b6',
    '#1abc9c', '#e67e22', '#e91e63', '#00bcd4', '#8bc34a',
    '#ff5722', '#673ab7', '#ffc107', '#607d8b', '#795548', '#009688'
];

// ─── State ──────────────────────────────────────────────────────────────────
const canvas    = document.getElementById('wheel');
const ctx       = canvas.getContext('2d');
const spinBtn   = document.getElementById('spin-btn');
const resultDiv = document.getElementById('result');
const errorDiv  = document.getElementById('error');

let items           = [];   // [{label, pct}] — pct sums to 1
let currentRotation = 0;    // cumulative radians; grows with each spin
let spinning        = false;

// ─── Canvas sizing ──────────────────────────────────────────────────────────
function setSize() {
    const size = Math.min(window.innerWidth - 48, 520);
    canvas.width  = size;
    canvas.height = size;
    drawWheel();
}
window.addEventListener('resize', setSize);

// ─── Load items.csv ─────────────────────────────────────────────────────────
fetch('./items.csv')
    .then(r => {
        if (!r.ok) throw new Error(`Could not fetch items.csv (HTTP ${r.status}).`);
        return r.text();
    })
    .then(text => {
        items = parseCSV(text);
        if (!items.length) throw new Error('items.csv contains no valid rows.');
        setSize();
    })
    .catch(err => {
        errorDiv.innerHTML =
            `⚠️ ${err.message}<br><br>` +
            `<strong>Make sure:</strong><br>` +
            `• <code>items.csv</code> is in the same folder as <code>index.html</code><br>` +
            `• You're viewing the site via GitHub Pages (or a local web server),<br>` +
            `&nbsp;&nbsp;not by opening the file directly in a browser.`;
        setSize();
    });

function parseCSV(text) {
    const out = [];
    let totalWeight = 0;

    for (const rawLine of text.split('\n')) {
        const line = rawLine.trim();
        if (!line || line.startsWith('#')) continue;   // skip blanks / comments

        const commaAt = line.indexOf(',');
        if (commaAt === -1) continue;

        const label  = line.slice(0, commaAt).trim();
        const weight = parseFloat(line.slice(commaAt + 1).trim());

        if (!label || isNaN(weight) || weight <= 0) continue;
        out.push({ label, weight });
        totalWeight += weight;
    }

    // Normalise weights → proportions (handles any scale, not just %-based)
    out.forEach(item => { item.pct = item.weight / totalWeight; });
    return out;
}

// ─── Drawing ────────────────────────────────────────────────────────────────
function drawWheel() {
    const W = canvas.width, H = canvas.height;
    const cx = W / 2, cy = H / 2;
    const outerR = Math.min(cx, cy) - 4;
    const hubR   = 30;

    ctx.clearRect(0, 0, W, H);

    if (!items.length) {
        ctx.fillStyle = '#445';
        ctx.font = '16px Segoe UI';
        ctx.textAlign = 'center';
        ctx.textBaseline = 'middle';
        ctx.fillText('Loading…', cx, cy);
        return;
    }

    // Dynamic font size: smaller when there are many items
    const fontSize = Math.max(9, Math.min(15, (outerR * Math.PI) / items.length / 5));

    let angle = currentRotation - Math.PI / 2; // start drawing from the top

    items.forEach((item, i) => {
        const sweep    = item.pct * 2 * Math.PI;
        const endAngle = angle + sweep;
        const mid      = angle + sweep / 2;

        // Filled segment
        ctx.beginPath();
        ctx.moveTo(cx, cy);
        ctx.arc(cx, cy, outerR, angle, endAngle);
        ctx.closePath();
        ctx.fillStyle = COLORS[i % COLORS.length];
        ctx.fill();

        // Divider line
        ctx.strokeStyle = 'rgba(255,255,255,0.3)';
        ctx.lineWidth = 1.5;
        ctx.stroke();

        // Label — drawn radially, aligned toward the rim
        ctx.save();
        ctx.translate(cx, cy);
        ctx.rotate(mid);
        ctx.textAlign    = 'right';
        ctx.textBaseline = 'middle';
        ctx.fillStyle    = '#fff';
        ctx.font         = `bold ${fontSize}px Segoe UI`;
        ctx.shadowColor  = 'rgba(0,0,0,0.6)';
        ctx.shadowBlur   = 4;
        ctx.fillText(item.label, outerR - 14, 0);
        ctx.restore();

        angle = endAngle;
    });

    // Outer rim ring
    ctx.beginPath();
    ctx.arc(cx, cy, outerR, 0, 2 * Math.PI);
    ctx.strokeStyle = '#0f3460';
    ctx.lineWidth   = 5;
    ctx.stroke();

    // Centre hub
    ctx.beginPath();
    ctx.arc(cx, cy, hubR, 0, 2 * Math.PI);
    ctx.fillStyle   = '#16213e';
    ctx.fill();
    ctx.strokeStyle = '#ffd700';
    ctx.lineWidth   = 3;
    ctx.stroke();

    // Centre pin
    ctx.beginPath();
    ctx.arc(cx, cy, 7, 0, 2 * Math.PI);
    ctx.fillStyle = '#ffd700';
    ctx.fill();
}

// ─── Weighted random pick ────────────────────────────────────────────────────
function weightedRandom() {
    let r = Math.random(), cum = 0;
    for (let i = 0; i < items.length; i++) {
        cum += items[i].pct;
        if (r < cum) return i;
    }
    return items.length - 1; // rounding safety
}

// ─── Local mid-angle of a segment ───────────────────────────────────────────
// "Local" means measured clockwise from the top of the wheel (angle 0 = top).
function segmentLocalMid(index) {
    let cum = 0;
    for (let i = 0; i < index; i++) cum += items[i].pct;
    return (cum + items[index].pct / 2) * 2 * Math.PI;
}

// ─── Spin ────────────────────────────────────────────────────────────────────
spinBtn.addEventListener('click', () => {
    if (spinning || !items.length) return;

    spinning = true;
    spinBtn.disabled = true;
    resultDiv.textContent = '';

    const winner   = weightedRandom();
    const localMid = segmentLocalMid(winner);

    // The pointer sits at the top (canvas angle −π/2).
    // A segment's screen angle = localAngle + currentRotation − π/2.
    // For the winner's midpoint to sit at −π/2 (top):
    //   localMid + targetRotation − π/2 = −π/2 + k·2π
    //   targetRotation = −localMid + k·2π
    //
    // Choose k large enough to guarantee ≥ minSpins full rotations forward.
    const minSpins = 5 + Math.floor(Math.random() * 5); // 5–9 extra spins
    const k = Math.ceil(
        (currentRotation + minSpins * 2 * Math.PI + localMid) / (2 * Math.PI)
    );
    const targetRotation = -localMid + k * 2 * Math.PI;

    const duration      = 4000 + Math.random() * 1500; // 4–5.5 s
    const startRotation = currentRotation;
    const delta         = targetRotation - startRotation;
    let   startTime     = null;

    // Quartic ease-out: fast start, slow finish
    function easeOut(t) { return 1 - Math.pow(1 - t, 4); }

    function tick(ts) {
        if (!startTime) startTime = ts;
        const t = Math.min((ts - startTime) / duration, 1);

        currentRotation = startRotation + delta * easeOut(t);
        drawWheel();

        if (t < 1) {
            requestAnimationFrame(tick);
        } else {
            currentRotation = targetRotation; // snap to exact value
            spinning        = false;
            spinBtn.disabled = false;
            resultDiv.textContent = `🎉 ${items[winner].label}!`;
        }
    }

    requestAnimationFrame(tick);
});
</script>
</body>
</html>
